<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Just My Links — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #f9f9f9;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 28px 32px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #333;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      font-size: 13px;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #1a1a2e;
    }

    .hint {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }

    button {
      padding: 10px 24px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #2d2d54; }

    #status {
      display: inline-block;
      margin-left: 12px;
      font-size: 13px;
      color: #2e7d32;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Just My Links Settings</h1>
    <p class="subtitle">Configure your API connection</p>

    <div class="field">
      <label for="api-url">API URL</label>
      <input type="url" id="api-url" placeholder="https://xxxx.execute-api.us-east-1.amazonaws.com/dev">
      <p class="hint">The API Gateway endpoint URL from your CloudFormation stack outputs</p>
    </div>

    <div class="field">
      <label for="bearer-token">Bearer Token</label>
      <input type="password" id="bearer-token" placeholder="Your secret token">
      <p class="hint">The token you set as the BearerToken CloudFormation parameter</p>
    </div>

    <div>
      <button id="save-btn">Save</button>
      <span id="status"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
