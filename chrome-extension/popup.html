<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      width: 320px;
      background: #fff;
      color: #1a1a1a;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .link-icon {
      width: 18px;
      height: 18px;
      opacity: 0.9;
    }

    .content {
      padding: 16px;
    }

    .url-box {
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #555;
      word-break: break-all;
      line-height: 1.4;
      min-height: 36px;
      max-height: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .title-text {
      font-size: 13px;
      font-weight: 500;
      color: #333;
      margin-top: 10px;
      margin-bottom: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #save-btn {
      width: 100%;
      padding: 10px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    #save-btn:hover:not(:disabled) {
      background: #2d2d54;
    }

    #save-btn:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      min-height: 18px;
      text-align: center;
    }

    .status.saving { color: #666; }
    .status.success { color: #2e7d32; font-weight: 500; }
    .status.error { color: #c62828; }

    footer {
      border-top: 1px solid #f0f0f0;
      padding: 8px 16px;
      text-align: right;
    }

    footer a {
      font-size: 11px;
      color: #888;
      text-decoration: none;
    }

    footer a:hover { color: #555; text-decoration: underline; }

    .not-configured {
      padding: 16px;
      text-align: center;
      color: #666;
      font-size: 13px;
      line-height: 1.5;
    }

    .not-configured a {
      color: #1a1a2e;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <header>
    <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </svg>
    <h1>Just My Links</h1>
  </header>

  <div id="main">
    <div class="content">
      <div class="url-box" id="current-url">Loading...</div>
      <div class="title-text" id="current-title"></div>
      <button id="save-btn">Save Page</button>
      <div class="status" id="status"></div>
    </div>
  </div>

  <div id="not-configured" style="display:none">
    <div class="not-configured">
      Configure your API URL and token in <a href="#" id="open-options">Settings</a> first.
    </div>
  </div>

  <footer>
    <a href="#" id="settings-link">Settings</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
